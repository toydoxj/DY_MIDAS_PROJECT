# .claude/ 자산 인덱스
#
# 모든 agent / skill / rule / command 의 단일 진실 원천(SSOT).
# 변경 시 scripts/claude_assets_lint.py 통과 확인.
#
# 스키마:
#   id            — 자산 고유 ID (frontmatter 의 name 과 일치 우선)
#   type          — agent | skill | rule | command | shared
#   path          — 저장소 루트 기준 상대 경로
#   status        — stable | experimental | deprecated
#   owner         — 책임자 (GitHub username)
#   last_reviewed — YYYY-MM-DD
#   depends_on    — 다른 자산 ID 목록 (선택)
#   notes         — 자유 메모 (선택)

