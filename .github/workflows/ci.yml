name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  frontend:
    name: Frontend (lint + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  backend:
    name: Backend (import smoke + pytest)
    # midas-gen 패키지가 winreg 의존이 있어 Windows 러너에서 검증한다.
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx
      - name: Import smoke
        shell: bash
        run: |
          python -c "import sys; sys.path.insert(0,'backend'); sys.path.insert(0,'.'); from main import app; print(f'routes={len(app.routes)}')"
      - name: Pytest (skip if no tests)
        shell: bash
        run: |
          if [ -d tests ] || [ -d backend/tests ]; then
            pytest -q
          else
            echo "no tests directory — skipping"
          fi
